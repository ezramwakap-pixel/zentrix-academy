<!DOCTYPE html>
<html>
<head>
<title>Zentrix Academy</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020617">

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:22px;
  background:rgba(255,255,255,0.05);
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.container{
  max-width:400px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  margin:15px;
  padding:20px;
  border-radius:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
}

.copyBtn{
  background:#3b82f6;
}
</style>
</head>

<body>

<header>Zentrix Academy 🚀</header>

<div class="hero">
<h2>Learn Skills & Make Money 💰</h2>
</div>

<div class="container">

<div class="card" id="loginBox">
<input id="code" placeholder="Enter code">
<button onclick="login()">Ingia</button>
</div>

<div class="card" id="adminPanel" style="display:none;">
<button onclick="generateCode()">Generate Code</button>
<p id="newCode"></p>
<button class="copyBtn" onclick="copyCode()">Copy</button>
<ul id="codeList"></ul>
</div>

</div>

<script>

let codes = JSON.parse(localStorage.getItem("codes")) || [];
let lastCode="";

function login(){
let code=document.getElementById("code").value;

if(code==="ADMIN001"){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
showCodes();
return;
}

let found=codes.find(c=>c.value===code);

if(found){
if(found.used){
alert("Used!");
}else{
found.used=true;
localStorage.setItem("codes",JSON.stringify(codes));
window.location.href="course.html";
}
}else{
alert("Wrong code");
}
}

function generateCode(){
let newCode="ZTX"+Math.floor(Math.random()*100000);
codes.push({value:newCode,used:false});
localStorage.setItem("codes",JSON.stringify(codes));
lastCode=newCode;
document.getElementById("newCode").innerText=newCode;
showCodes();
}

function copyCode(){
navigator.clipboard.writeText(lastCode);
alert("Copied");
}

function showCodes(){
let list=document.getElementById("codeList");
list.innerHTML="";
codes.forEach(c=>{
let li=document.createElement("li");
li.innerText=c.value+(c.used?" (used)":"");
list.appendChild(li);
});
}

// PWA install
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
