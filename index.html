<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Academy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

header{
  background:#0f172a;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.hero{
  padding:40px;
}

.card{
  background:#0f172a;
  margin:15px;
  padding:20px;
  border-radius:12px;
}

input{
  padding:12px;
  width:80%;
  margin:10px;
  border-radius:8px;
  border:none;
}

.btn{
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.btn:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<header>Zentrix Academy 🚀</header>

<div class="hero">
<h1>Learn. Build. Earn.</h1>
<p>Ingia na code yako kuanza mafunzo</p>
</div>

<div class="card">
<h2>🔐 Ingiza Code</h2>

<input type="text" id="code" placeholder="Weka code yako">

<br>
<button class="btn" onclick="ingia()">Ingia</button>
</div>

<div class="card">
<h2>💰 Lipia Mafunzo</h2>

<p>Airtel Money: <b>139950184</b></p>
<p>M-Pesa / TigoPesa: <b>0795 191 608</b></p>

<p>Baada ya kulipa utapewa code ya kuingia</p>
</div>

<script>

// list ya codes
var validCodes = [
  "ZENTRIX101",
  "ZENTRIX202",
  "ZENTRIX303",
  "ZENTRIX404",
  "ZENTRIX505"
];

// codes zilizotumika
var usedCodes = [];

function ingia(){
  var code = document.getElementById("code").value;

  if(code === "ADMIN001"){
    window.location.href = "course.html";
    return;
  }

  if(validCodes.includes(code)){

    if(usedCodes.includes(code)){
      alert("Code tayari imesha tumika!");
    }else{
      usedCodes.push(code);
      localStorage.setItem("usedCodes", JSON.stringify(usedCodes));
      window.location.href = "course.html";
    }

  }else{
    alert("Code sio sahihi!");
  }
}

// load used codes
var saved = localStorage.getItem("usedCodes");
if(saved){
  usedCodes = JSON.parse(saved);
}

</script>

</body>
</html>
