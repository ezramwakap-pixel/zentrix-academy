<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zentrix Course</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020c1b;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  background: #0a192f;
  padding: 20px;
  border-radius: 15px;
  margin: 20px;
}

input {
  padding: 12px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  background: #00c853;
  border: none;
  border-radius: 10px;
  color: white;
  margin-top: 15px;
}

#course {
  display: none;
}
</style>

</head>

<body>

<div class="container">

<h1>🎓 Zentrix Course</h1>

<!-- CODE INPUT -->
<div id="login">
  <h3>Weka Access Code</h3>
  <input type="text" id="code" placeholder="Enter code...">
  <br>
  <button onclick="checkCode()">Fungua Course</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- COURSE CONTENT -->
<div id="course">

  <div class="card">
    <h2>Lesson 1</h2>
    <video width="100%" controls>
      <source src="video.mp4" type="video/mp4">
    </video>
    <p>Intro</p>
  </div>

  <div class="card">
    <h2>Lesson 2</h2>
    <a href="file.pdf" style="color:#00c853;">Download PDF</a>
  </div>

  <div class="card">
    <h2>Lesson 3</h2>
    <p>Advanced training</p>
  </div>

</div>

</div>

<script>

const validCodes = ["ZENTRIX123", "ADMIN999"]; // codes zako

function checkCode() {
  let userCode = document.getElementById("code").value;

  if(validCodes.includes(userCode)) {
    document.getElementById("login").style.display = "none";
    document.getElementById("course").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Code sio sahihi!";
  }
}

</script>

</body>
</html>
