<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:#e2e8f0;
}

/* SECTIONS */
.section{display:none;padding:15px;}
.active{display:block;}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
font-size:13px;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#1e293b;
display:flex;
justify-content:space-around;
padding:8px;
}

.nav button{
background:none;
font-size:18px;
}

/* PROFILE */
.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
}
</style>

</head>

<body>

<!-- LOGIN SIMPLE -->
<div id="login" class="section active">

<div class="card">
<h3>Karibu Zentrix 👋</h3>
<p style="font-size:12px;opacity:0.7;">
Ingiza jina lako kuendelea
</p>

<input id="name" placeholder="Jina lako">

<button onclick="login()">Ingia</button>
</div>

</div>

<!-- HOME -->
<div id="home" class="section">

<div class="card profile">
<img src="https://i.pravatar.cc/100" id="profilePic">
<div>
<h3 id="welcome"></h3>
<p style="font-size:12px;opacity:0.6;">User Active</p>
</div>
</div>

<div class="card">
<h4>👥 Users</h4>
<p id="userCount">0</p>
</div>

<div class="card">
<h4>🎓 Courses</h4>
<button onclick="openCourse('graphics')">Graphics Design</button>
<button onclick="openCourse('business')">Business</button>
</div>

<div class="card">
<h4>📢 Ads</h4>
<p style="font-size:12px;">Weka tangazo lako</p>
<button onclick="show('ads')">Tangaza</button>
</div>

</div>

<!-- COURSE -->
<div id="course" class="section">
<div class="card">
<h3 id="courseTitle"></h3>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/dQw4w9WgXcQ">
</iframe>

<p id="courseDesc"></p>
</div>

<button onclick="back()">⬅ Back</button>
</div>

<!-- ADS -->
<div id="ads" class="section">
<div class="card">
<h3>📢 Tangaza Video</h3>

<input id="adLink" placeholder="Weka link ya video">

<button onclick="submitAd()">Tuma</button>

<p style="font-size:12px;">Lipia: 0795191608</p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('course')">📚</button>
<button onclick="show('ads')">📢</button>
</div>

<script>

/* SHOW */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* LOGIN SIMPLE */
function login(){

if(!name.value){
alert("Weka jina");
return;
}

let approved = localStorage.getItem("approved");

if(!approved){
alert("⏳ Subiri uthibitishwe kwanza (admin)");
return;
}

localStorage.setItem("userName", name.value);

let count = localStorage.getItem("usersCount") || 0;
count++;
localStorage.setItem("usersCount", count);

loadUser();
show('home');
}

/* LOAD USER */
function loadUser(){
let user = localStorage.getItem("userName");

welcome.innerText = "Karibu "+user;

let count = localStorage.getItem("usersCount") || 0;
userCount.innerText = count;
}

/* APPROVE (WEWE NDIO ADMIN UTACLICK HII KWA SIMU YAKO TU) */
localStorage.setItem("approved","true");

/* COURSE */
function openCourse(type){
show('course');

if(type==="graphics"){
courseTitle.innerText="Graphics Design";
courseDesc.innerText="Jifunze design kama pro.";
}

if(type==="business"){
courseTitle.innerText="Business";
courseDesc.innerText="Jifunze biashara step by step.";
}
}

function back(){show('home');}

/* ADS */
function submitAd(){
alert("Tangazo limepokelewa ✔");
}

</script>

</body>
</html>
